# JMX Exporter config for Apache Cassandra 4.0
# Deploy as: java -javaagent:jmx_prometheus_javaagent.jar=9404:jmx_exporter.yml
startDelaySeconds: 0
ssl: false
lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  # Client request metrics (reads/writes/CAS)
  - pattern: "org.apache.cassandra.metrics<type=ClientRequest, scope=(.*), name=(.*)><>(Count|OneMinuteRate|FiveMinuteRate|MeanRate)"
    name: cassandra_client_request_$3
    labels:
      scope: $1
      metric: $2

  # Read/Write latency
  - pattern: "org.apache.cassandra.metrics<type=ClientRequest, scope=(.*), name=Latency><>(50thPercentile|75thPercentile|95thPercentile|99thPercentile)"
    name: cassandra_client_request_latency_percentile
    labels:
      scope: $1
      quantile: $2

  # Compaction metrics
  - pattern: "org.apache.cassandra.metrics<type=Compaction, name=(.*)><>(Value|Count|OneMinuteRate)"
    name: cassandra_compaction_$2
    labels:
      metric: $1

  # Storage metrics
  - pattern: "org.apache.cassandra.metrics<type=Storage, name=(.*)><>(Value|Count)"
    name: cassandra_storage_$2
    labels:
      metric: $1

  # GC metrics
  - pattern: "java.lang<type=GarbageCollector, name=(.*)><>CollectionCount"
    name: jvm_gc_collection_count
    labels:
      gc: $1

  - pattern: "java.lang<type=GarbageCollector, name=(.*)><>CollectionTime"
    name: jvm_gc_collection_time_ms
    labels:
      gc: $1

  # Thread metrics
  - pattern: "org.apache.cassandra.metrics<type=ThreadPools, path=(.*), scope=(.*), name=(ActiveTasks|PendingTasks|CompletedTasks|BlockedTasks)><>Value"
    name: cassandra_thread_pools_$4
    labels:
      path: $1
      scope: $2

  # Cache metrics
  - pattern: "org.apache.cassandra.metrics<type=Cache, scope=(.*), name=(HitRate|Requests|Hits|Misses|Size)><>Value"
    name: cassandra_cache_$2
    labels:
      cache: $1

  # Node health
  - pattern: "org.apache.cassandra.metrics<type=CQL, name=(.*)><>(Count|OneMinuteRate)"
    name: cassandra_cql_$2
    labels:
      metric: $1

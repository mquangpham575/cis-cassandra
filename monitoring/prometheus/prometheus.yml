global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Cassandra nodes via JMX exporter (runs as Java agent on each node, port 9404)
  - job_name: "cassandra"
    static_configs:
      - targets:
          - "192.168.56.11:9404"
          - "192.168.56.12:9404"
          - "192.168.56.13:9404"
        labels:
          cluster: "cis-cassandra"

  # CIS compliance backend API
  - job_name: "cis-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "192.168.56.11:8000"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

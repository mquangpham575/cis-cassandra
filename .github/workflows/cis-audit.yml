name: CIS Cassandra CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, feat/cis-implementation]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 — Lint & syntax-check all bash scripts
  # ─────────────────────────────────────────────────────────────
  lint-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check all bash scripts
        run: |
          for f in scripts/cis-tool.sh scripts/lib/*.sh scripts/cluster/*.sh scripts/tests/*.sh; do
            bash -n "$f" && echo "✅ syntax OK: $f"
          done

      - name: Shellcheck (warnings only, non-blocking)
        run: |
          shellcheck --severity=error scripts/cis-tool.sh scripts/lib/*.sh \
            scripts/cluster/*.sh || true

      - name: Run bash unit tests
        run: |
          export CASSANDRA_YAML=/dev/null
          export LOGBACK_XML=/dev/null
          bash scripts/tests/test_audit.sh 2>&1

  # ─────────────────────────────────────────────────────────────
  # Job 2 — Run Python/FastAPI tests
  # ─────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        run: |
          cd backend
          PYTHONPATH=. python -m pytest tests/ -v --tb=short 2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/.pytest_cache/

  # ─────────────────────────────────────────────────────────────
  # Job 3 — Build + test the React frontend
  # ─────────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Run Vitest
        run: |
          cd frontend
          npm test

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─────────────────────────────────────────────────────────────
  # Job 4 — Static security analysis (runs after all other jobs)
  # ─────────────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: [lint-bash, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit (Python SAST)
        run: pip install bandit[toml]

      - name: Bandit scan — backend
        run: |
          bandit -r backend/ \
            --exclude backend/tests/ \
            --severity-level medium \
            --confidence-level medium \
            -f txt || true

      - name: Scan for hardcoded secrets (rudimentary)
        run: |
          echo "=== Checking for hardcoded passwords in scripts ==="
          grep -rn "password\s*=\s*['\"][^$]" scripts/ || echo "No obvious hardcoded passwords found"
          echo "=== Checking for hardcoded passwords in backend ==="
          grep -rn "password\s*=\s*['\"]" backend/ --include="*.py" || echo "No obvious hardcoded passwords found"

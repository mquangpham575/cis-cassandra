name: CIS Cassandra CI

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # 1. BASH LINT & SYNTAX
  lint-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Syntax check bash scripts
        run: |
          shopt -s nullglob globstar
          for f in scripts/**/*.sh cis-tool.sh; do
            bash -n "$f" && echo "✅ syntax OK: $f"
          done

  # 2. BACKEND TEST & SECURITY
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt bandit
      - name: Bandit Security Scan
        run: |
          cd backend
          bandit -r . --severity-level medium -f txt || true
      - name: Run Pytest
        run: |
          cd backend
          PYTHONPATH=. python -m pytest tests/ -v --tb=short

  # 3. FRONTEND BUILD & TEST
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install & Lint
        run: |
          cd frontend
          npm ci
          npm run lint
      - name: TypeScript & Unit Test
        run: |
          cd frontend
          npx tsc --noEmit
          npm test

  # 4. SECURITY GATE (CIS Compliance)
  security-gate:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v6
      - name: Verify CIS Critical Compliance
        run: |
          FIXTURE="scripts/tests/audit-fixture.json"
          CRITICAL=$(jq '[.checks[] | select(.status=="FAIL" and .severity=="CRITICAL")] | length' "$FIXTURE")
          echo "🔴 CRITICAL FAILURES: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "🚫 BLOCKED: Critical CIS violations detected."
            exit 1
          fi
          echo "✅ Security gate passed."

  # 5. INFRASTRUCTURE AUDIT (Azure)
  infra-audit:
    runs-on: ubuntu-latest
    needs: security-gate
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Audit VM Status
        run: |
          az account show --output table
          echo "=== Cluster Nodes Status ==="
          az vm list --resource-group rg-cis-cassandra --query "[].{Name:name, State:provisioningState, Power:powerState}" --output table
